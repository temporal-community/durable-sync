name: Publish to PyPI

# Publishes to PyPI when you publish a GitHub Release. No API tokens: auth is via
# OIDC "trusted publishing" (configured once on PyPI — see CONTRIBUTING / README).
# Cut a release whose tag matches the version in pyproject.toml (e.g. v0.1.0).
on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The 'pypi' environment is where the trusted-publisher identity is bound; you
    # can add required reviewers to it on GitHub for a manual approval gate.
    environment:
      name: pypi
      url: https://pypi.org/project/durable-sync/
    permissions:
      id-token: write          # REQUIRED: mints the OIDC token PyPI trusts
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
